version: 2
updates:
  - package-ecosystem: "npm"
    directory: "raid-agency-app"
    schedule:
      interval: "daily"
    groups:
      mui:
        patterns: ["@mui/*"]
      tanstack:
        patterns: ["@tanstack/*"]
      testing:
        patterns: ["@testing-library/*", "@playwright/*", "vitest", "@vitest/*", "jsdom"]
      eslint:
        patterns: ["eslint*", "@typescript-eslint/*"]
      vite:
        patterns: ["vite", "@vitejs/*"]
    ignore:
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@typescript-eslint/*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "daily"
    groups:
      keycloak:
        patterns: ["org.keycloak:*"]
      spring:
        patterns: ["org.springframework*"]
      testing:
        patterns: ["org.mockito:*", "org.assertj:*", "org.junit*"]
      feign:
        patterns: ["io.github.openfeign:*"]
      jakarta:
        patterns: ["jakarta.*"]
    ignore:
      - dependency-name: "org.springframework.boot"
        update-types: ["version-update:semver-major"]
      - dependency-name: "org.openapi.generator"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "docker"
    directory: "iam"
    schedule:
      interval: "daily"

  - package-ecosystem: "docker"
    directory: "api-svc/raid-api"
    schedule:
      interval: "daily"
