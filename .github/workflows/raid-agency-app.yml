name: Build and test raid-agency-app

on:
  workflow_dispatch:
  pull_request:
    paths:
      - .github/**
      - raid-agency-app/**
      - raid-agency-app-static/**

jobs:
  build:
    defaults:
      run:
        working-directory: raid-agency-app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Reset npm to public registry
        run: |
          echo "registry=https://registry.npmjs.org/" > ~/.npmrc
          npm cache clean --force
      - run: npm ci
      - run: npm run build
      - run: npm test -- --run