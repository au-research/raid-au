name: Build and test raid-agency-app-static

on:
  workflow_dispatch:
  pull_request:
    paths:
      - .github/**
      - raid-agency-app-static/**

jobs:
  build:
    defaults:
      run:
        working-directory: raid-agency-app-static
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: raid-agency-app-static/package-lock.json
      - run: npm ci
      - name: Create raw-data stubs for CI build
        run: |
          mkdir -p src/raw-data
          echo '[]' > src/raw-data/raids.json
          echo '[]' > src/raw-data/handles.json
          echo '[]' > src/raw-data/embargoed-raids.json
      - run: npx astro check && npx astro build
      - run: npm test
