id: https://example.org/raid-schema-org
name: raid-schema-org
title: RAiD to Schema.org ResearchProject Mapping
description: LinkML schema for mapping RAiD (Research Activity Identifier) to schema.org ResearchProject

prefixes:
  linkml: https://w3id.org/linkml/
  schema: https://schema.org/
  raid: https://vocabulary.raid.org/
  credit: https://credit.niso.org/
  orcid: https://orcid.org/
  ror: https://ror.org/

default_prefix: raid

imports:
  - linkml:types

classes:
  ResearchProject:
    class_uri: schema:ResearchProject
    description: A research project with contributors and organizational relationships
    attributes:
      context:
        range: string
        description: The schema.org context
        alias: "@context"
        annotations:
          json_property: "@context"
      type:
        range: string
        description: The schema.org type
        ifabsent: string(ResearchProject)
        alias: "@type"
        annotations:
          json_property: "@type"
      id:
        identifier: true
        range: uriorcurie
        description: The RAiD identifier
        alias: "@id"
        annotations:
          json_property: "@id"
      identifier:
        slot_uri: schema:identifier
        exact_mappings:
          - raid:id
        required: true
        range: PropertyValue
      name:
        slot_uri: schema:name
        range: string
        description: The title/name of the research project (all titles joined by " | ")
      headline:
        slot_uri: schema:headline
        range: string
        description: The primary-type title of the research project
      description:
        slot_uri: schema:description
        range: string
        description: Description of the research project
      foundingDate:
        slot_uri: schema:foundingDate
        range: date
        description: When the research project was established
      dissolutionDate:
        slot_uri: schema:dissolutionDate
        range: date
        description: When the research project was completed
      keywords:
        slot_uri: schema:keywords
        range: string
        description: Keywords associated with the project
      location:
        slot_uri: schema:location
        range: Place
        inlined: true
        description: Geographic location of the project
      knowsAbout:
        slot_uri: schema:knowsAbout
        range: DefinedTerm
        multivalued: true
        inlined: true
        inlined_as_list: true
        description: Research subjects/domains the project covers
      member:
        slot_uri: schema:member
        range: ResearchProjectRole
        multivalued: true
        inlined: true
        inlined_as_list: true
        description: Roles of people and organizations in the project
      funder:
        slot_uri: schema:funder
        range: ResearchProjectRole
        multivalued: true
        inlined: true
        inlined_as_list: true
        description: Organizations that fund the project
      parentOrganization:
        slot_uri: schema:parentOrganization
        range: Organization
        inlined: true
        description: >-
          The RAiD registration agency: the ROR-identified organisation that
          operates the registration service. Emitted as an Organization whose
          identifier is the agency ROR. Resolved under RAID-778: both live
          emitters use the registration agency (the static-site json-ld.ts as
          parentOrganization, the API RaidJsonLdConverter as publisher). The
          earlier "owner" description was incorrect and has been superseded.
      citation:
        slot_uri: schema:citation
        range: CreativeWork
        multivalued: true
        inlined: true
        inlined_as_list: true
        description: >-
          Related objects (research inputs/outputs) emitted as a flat list of
          CreativeWork references. The category is preserved on additionalType
          rather than split across distinct properties. See RAID-757.
      isPartOf:
        slot_uri: schema:isPartOf
        range: RelatedResearchProject
        multivalued: true
        inlined: true
        inlined_as_list: true
        description: >-
          Related RAiDs of which this project is a part
          (relatedRaid.type.schema/202). See RAID-706.
      hasPart:
        slot_uri: schema:hasPart
        range: RelatedResearchProject
        multivalued: true
        inlined: true
        inlined_as_list: true
        description: >-
          Related RAiDs that are part of this project
          (relatedRaid.type.schema/201). See RAID-706.
      isBasedOn:
        slot_uri: schema:isBasedOn
        range: RelatedResearchProject
        multivalued: true
        inlined: true
        inlined_as_list: true
        description: >-
          Related RAiDs this project is derived from
          (relatedRaid.type.schema/200). See RAID-706.
      isRelatedTo:
        slot_uri: schema:isRelatedTo
        range: RelatedResearchProject
        multivalued: true
        inlined: true
        inlined_as_list: true
        description: >-
          Related RAiDs with any other relationship type. Carries the raw
          relationshipType URI and its resolved relationshipTypeName label.
          See RAID-706/756.
  Organization:
    class_uri: schema:Organization
    attributes:
      type:
        range: string
        description: The schema.org type
        ifabsent: string(Organization)
        alias: "@type"
        annotations:
          json_property: "@type"
      id:
        range: string
        description: The ROR of the organization
        alias: "@id"
        annotations:
          json_property: "@id"
      name:
        slot_uri: schema:name
        range: string
        description: >-
          Name of the organization. Optional: the live parentOrganization
          emitter carries only the ROR identifier, not a name.
      identifier:
        slot_uri: schema:identifier
        range: PropertyValue
        required: true
        inlined: true
        description: Extended identifier information (the agency ROR as a PropertyValue)
  ResearchProjectRole:
    class_uri: schema:Role
    description: A role held by a person or organization in the project
    attributes:
      type:
        range: string
        description: The schema.org type
        ifabsent: string(Role)
        alias: "@type"
        annotations:
          json_property: "@type"
      id:
        identifier: true
        range: uriorcurie
        description: Identifier for the role (position ID or CRediT role URI)
        alias: "@id"
        annotations:
          json_property: "@id"
      roleName:
        slot_uri: schema:roleName
        range: string
        required: true
        description: Name of the role
      startDate:
        slot_uri: schema:startDate
        range: date
        description: When the role started
      endDate:
        slot_uri: schema:endDate
        range: date
        description: When the role ended (if applicable)
      member:
        slot_uri: schema:member
        range: Member
        required: true
        inlined: true
        description: The person or organization holding this role

  Member:
    description: A person or organization involved in the research project
    attributes:
      type:
        range: string
        description: The schema.org type (Person or Organization)
        required: true
        alias: "@type"
        annotations:
          json_property: "@type"
      id:
        identifier: true
        range: uriorcurie
        description: Identifier for the member (ORCID for persons, ROR for organizations)
        alias: "@id"
        annotations:
          json_property: "@id"
      identifier:
        slot_uri: schema:identifier
        range: PropertyValue
        inlined: true
        description: Structured identifier with type information
  Place:
    class_uri: schema:Place
    description: Geographic location
    attributes:
      type:
        range: string
        description: The schema.org type
        ifabsent: string(Place)
        alias: "@type"
        annotations:
          json_property: "@type"
      id:
        identifier: true
        range: uriorcurie
        description: GeoNames or other geographic identifier
        alias: "@id"
        annotations:
          json_property: "@id"
      name:
        slot_uri: schema:name
        range: string
        description: Name of the place
      additionalType:
        slot_uri: schema:additionalType
        range: uriorcurie
        description: Additional type information
  DefinedTerm:
    class_uri: schema:DefinedTerm
    description: A term from a controlled vocabulary
    attributes:
      type:
        range: string
        description: The schema.org type
        ifabsent: string(DefinedTerm)
        alias: "@type"
        annotations:
          json_property: "@type"
      id:
        identifier: true
        range: uriorcurie
        description: URI identifier for the term
        alias: "@id"
        annotations:
          json_property: "@id"
      name:
        slot_uri: schema:name
        range: string
        description: Human-readable name of the term
      inDefinedTermSet:
        slot_uri: schema:inDefinedTermSet
        range: uriorcurie
        description: The vocabulary/taxonomy this term belongs to
  PropertyValue:
    class_uri: schema:PropertyValue
    description: A property-value pair for additional metadata
    attributes:
      type:
        range: string
        description: The schema.org type
        ifabsent: string(PropertyValue)
        alias: "@type"
        annotations:
          json_property: "@type"
      name:
        slot_uri: schema:name
        range: string
        description: Property name
      value:
        slot_uri: schema:value
        range: string
        description: Property value
      propertyID:
        slot_uri: schema:propertyID
        range: string
        description: Property identifier
  CreativeWork:
    class_uri: schema:CreativeWork
    description: >-
      A related research object (input/output) referenced by the project under
      the citation slot. See RAID-757.
    attributes:
      type:
        range: string
        description: The schema.org type
        ifabsent: string(CreativeWork)
        alias: "@type"
        annotations:
          json_property: "@type"
      id:
        identifier: true
        range: uriorcurie
        description: The identifier of the related object (DOI, ARK, ISBN or URL)
        alias: "@id"
        annotations:
          json_property: "@id"
      name:
        slot_uri: schema:name
        range: string
        description: >-
          The formatted citation text (APA string fetched from the identifier
          at build time) when available; omitted otherwise.
      identifier:
        slot_uri: schema:identifier
        range: PropertyValue
        required: true
        inlined: true
        description: >-
          Structured identifier carrying the scheme's propertyID and name.
          DOI/ARK/ISBN are recognised; every other scheme falls back to a
          generic URL identifier.
      additionalType:
        slot_uri: schema:additionalType
        range: uriorcurie
        multivalued: true
        description: >-
          The related object's category id(s) (Input/Output/Internal). In the
          live output a single category is emitted as a scalar and multiple
          categories as a list; the schema models this as multivalued. See
          RAID-757.
  RelatedResearchProject:
    class_uri: schema:ResearchProject
    description: >-
      A related RAiD referenced from isPartOf/hasPart/isBasedOn/isRelatedTo. Its
      identifier is the plain RAiD URI string, not a PropertyValue. See RAID-706.
    attributes:
      type:
        range: string
        description: The schema.org type
        ifabsent: string(ResearchProject)
        alias: "@type"
        annotations:
          json_property: "@type"
      id:
        identifier: true
        range: uriorcurie
        description: The related RAiD identifier
        alias: "@id"
        annotations:
          json_property: "@id"
      identifier:
        slot_uri: schema:identifier
        range: string
        description: The related RAiD identifier as a plain URI string
      relationshipType:
        range: uriorcurie
        description: >-
          The raw relatedRaid.type vocabulary URI. Emitted only under
          isRelatedTo; the other three properties encode the relationship in
          the property name itself. Serialized as a bare key resolved under the
          schema.org @vocab in the live output.
      relationshipTypeName:
        range: string
        description: >-
          The resolved human-readable label for relationshipType, when
          available. Emitted only under isRelatedTo. See RAID-706/756.

enums:
  RoleType:
    description: Types of roles in research projects
    permissible_values:
      position:
        description: Organizational position role
      leadership:
        description: Leadership role
      contact:
        description: Contact role
      credit:
        description: CRediT taxonomy contribution role
  AlternativeIdentifierPropertyEnum:
    permissible_values:
      https://datamodel.raid.org/core/alternativeIdentifier:
  PropertyIDEnum:
    permissible_values:
      "https://datamodel.raid.org/core/registrationAgency": {}
      "https://datamodel.raid.org/core/owner": {}