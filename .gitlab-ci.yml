build-frontend:
  stage: build
  script:
    - cd raid-agency-app
    - npm install
    - npm run build
  artifacts:
    paths:
      - "raid-agency-app/dist/"

build-api:
  stage: build
  script:
    - ./gradlew build
  artifacts:
    paths:
      - "api-svc/raid-api/build/libs"

test-api:
  stage: test
  script:
    - ./gradlew test

test-frontend:
  stage: test
  script:
    - cd raid-agency-app
    - npm run test
    - npm run e2e

