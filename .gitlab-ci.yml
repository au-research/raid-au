default:
#  tags:
#    - docker
#    - dpsd
#    - did
  services:
    - name: docker:29.2.1-dind
      alias: docker
stages:
  - before
  - build
  - test

tag-version:
  stage: before
  artifacts:
    paths:
      - version.txt
  script:
    - DOCKER_TAG_VERSION=$(date +"%Y%m%d%H")
    - echo "DOCKER_TAG_VERSION=$(date +"%Y%m%d%H")" > version.txt
    - echo "Version to use for docker tag $DOCKER_TAG_VERSION"
  rules:
    - if: $CI_COMMIT_TAG  # Run job ONLY if a tag is present (tag push event)
      when: always       # Always run the job when the condition is met

other-version:
  stage: before
  artifacts:
    paths:
      - version.txt
  script:
    - DOCKER_TAG_VERSION=$CI_COMMIT_REF_SLUG
    - echo "DOCKER_TAG_VERSION=$CI_COMMIT_REF_SLUG" > version.txt
    - echo "Version to use for docker tag $DOCKER_TAG_VERSION"
  rules:
    - if: $CI_COMMIT_BRANCH  # Run job ONLY if a tag is present (tag push event)
      when: always       # never run the job when the condition is met


build-frontend:
  stage: build
  image: node
  script:
    - cd raid-agency-app
    - npm install
    - npm run build
  artifacts:
    paths:
      - "raid-agency-app/dist/"
  cache:
    key: "$CI_PROJECT_ID"
    policy: pull-push  # Allow this job to update the cache (important as we run npm install here)
    paths:
      - raid-agency-app/node_modules/

docker-frontend:
  stage: build
  image: docker:29.2.1-cli
  dependencies:
    - other-version
    - tag-version
  needs:
    - build-frontend
    - job: other-version
      optional: true
    - job: tag-version
      optional: true

  variables:
    DOCKER_DRIVER: overlay2
    DOCKER_BUILDKIT: 1
    DOCKER_TLS_CERTDIR: ""
    IMAGE_TAG: $CI_REGISTRY_IMAGE/raid-fe:$DOCKER_TAG_VERSION
  cache:
    key: "$CI_PROJECT_ID"
    policy: pull
  script:
    - source version.txt
    - echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin
    - cd raid-agency-app
    - docker build -t $IMAGE_TAG .
    - docker push $IMAGE_TAG
