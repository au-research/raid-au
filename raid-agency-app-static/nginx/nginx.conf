server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Runtime config — never cache so agencies can swap the file without
    # a full image rebuild (volume mount or APP_CONFIG_URL proxy).
    # See nginx.conf.template for the APP_CONFIG_URL proxy variant.
    location = /app-config.json {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri =404;
    }

    # Hashed static assets can be cached aggressively
    location ~* \.(js|css|woff2?|png|svg|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Astro static pages — try exact file, then directory index, then .html extension
    location / {
        try_files $uri $uri/ $uri.html =404;
    }
}
