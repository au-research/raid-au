version: '3.4'
services:
  raid-iam-db:
    image: postgres:16.2
    ports:
      - 7432:5432
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
      POSTGRES_DB: keycloak
  raid-iam:
    depends_on:
      - raid-iam-db
    build: .
    network_mode: host
    ports:
      - 8001:8080
      - 9443:8443
    healthcheck:
      test: ["CMD", "curl", "-fk", "https://localhost:9000/health"]
      interval: 10s
      timeout: 5s
      retries: 50
    command: [ 'start-dev', '--import-realm', '--debug' ]
    volumes:
      - './realms:/opt/keycloak/data/import'
      - './themes/raid-custom:/opt/keycloak/themes/raid-custom'
      - './themes/ardc-branding:/opt/keycloak/themes/ardc-branding'
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: true
      KC_HOSTNAME: localhost
      KC_DB: postgres
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_DB_URL_DATABASE: keycloak
      KC_DB_URL_HOST: localhost
      KC_DB_URL_PORT: 7432
      KC_DB_SCHEMA: public
      KC_HOSTNAME_STRICT: false
      KC_HTTP_ENABLED: true
      KC_LOG_LEVEL: info,au.org.raid.iam:debug,org.keycloak.services:debug,org.keycloak.adapters:debug